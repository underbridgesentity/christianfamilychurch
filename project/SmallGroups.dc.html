<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0}*{box-sizing:border-box}[data-reveal]{opacity:1;transform:none}@keyframes cfcRv{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}@supports (animation-timeline:view()){[data-reveal]{opacity:0;animation:cfcRv linear both;animation-timeline:view();animation-range:entry 0% cover 26%}}/*resp*/@media(max-width:1024px){[style*="grid-template-columns: repeat(4, 1fr)"]{grid-template-columns:1fr 1fr !important}[style*="grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr 1fr !important}}@media(max-width:768px){[style*="grid-template-columns: 1fr 1fr"],[style*="grid-template-columns: 1.4fr 1fr"],[style*="grid-template-columns: 1.25fr 1fr"],[style*="grid-template-columns: 0.85fr 1.15fr"],[style*="grid-template-columns: repeat(4, 1fr)"],[style*="grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr"]{grid-template-columns:1fr !important}}</style>
</helmet>
<div style="width:100%;overflow-x:hidden;font-family:'Hanken Grotesk',sans-serif;color:#11203F;background:#fff">
  <dc-import name="Nav" overlay="{{ true }}" active="" hint-size="100%,78px"></dc-import>

  <section data-screen-label="Small Groups / Hero" style="position:relative;min-height:54vh;display:flex;align-items:center;overflow:hidden">
    <img src="assets/img-baby-dedication.jpg" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" />
    <div style="position:absolute;inset:0;background:linear-gradient(100deg, rgba(7,15,33,.84), rgba(7,15,33,.45))"></div>
    <div style="position:relative;z-index:2;max-width:1340px;width:100%;margin:0 auto;padding:150px clamp(20px,4vw,40px) 70px">
      <p style="font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:#9DBDF7;margin:0 0 22px">Small Groups</p>
      <h1 style="font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(42px,7.5vw,100px);line-height:.96;letter-spacing:-.03em;color:#fff;margin:0 0 18px">Find Your People</h1>
      <p style="font-size:clamp(17px,2vw,22px);font-weight:300;line-height:1.5;color:rgba(255,255,255,.84);max-width:520px;margin:0">Life is better together. Find a group that fits.</p>
    </div>
  </section>

  <!-- FILTER BAR -->
  <section style="background:#fff;border-bottom:1px solid #eceef2;position:sticky;top:78px;z-index:20">
    <div style="max-width:1340px;margin:0 auto;padding:22px clamp(20px,4vw,40px);display:flex;flex-wrap:wrap;gap:26px">
      <div>
        <span style="display:block;font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3b5;margin-bottom:9px">Campus</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <sc-for list="{{ campusOpts }}" as="o" hint-placeholder-count="3">
            <button onClick="{{ o.set }}" style="background:{{ o.bg }};color:{{ o.color }};border:1px solid {{ o.border }};font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:13.5px;padding:9px 17px;border-radius:100px;cursor:pointer;transition:all .2s">{{ o.label }}</button>
          </sc-for>
        </div>
      </div>
      <div>
        <span style="display:block;font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3b5;margin-bottom:9px">Day</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <sc-for list="{{ dayOpts }}" as="o" hint-placeholder-count="4">
            <button onClick="{{ o.set }}" style="background:{{ o.bg }};color:{{ o.color }};border:1px solid {{ o.border }};font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:13.5px;padding:9px 17px;border-radius:100px;cursor:pointer;transition:all .2s">{{ o.label }}</button>
          </sc-for>
        </div>
      </div>
      <div>
        <span style="display:block;font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3b5;margin-bottom:9px">Category</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <sc-for list="{{ catOpts }}" as="o" hint-placeholder-count="5">
            <button onClick="{{ o.set }}" style="background:{{ o.bg }};color:{{ o.color }};border:1px solid {{ o.border }};font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:13.5px;padding:9px 17px;border-radius:100px;cursor:pointer;transition:all .2s">{{ o.label }}</button>
          </sc-for>
        </div>
      </div>
    </div>
  </section>

  <!-- GROUPS -->
  <section style="background:#F4F5F7;padding:clamp(48px,6vw,80px) clamp(20px,4vw,40px) clamp(64px,8vw,110px)">
    <div style="max-width:1340px;margin:0 auto">
      <p style="font-size:14px;color:#5A6478;margin:0 0 26px">{{ countLabel }}</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px">
        <sc-for list="{{ groups }}" as="g" hint-placeholder-count="6">
          <div style="background:#fff;border-radius:8px;padding:28px;box-shadow:0 1px 3px rgba(11,24,48,.08);display:flex;flex-direction:column">
            <span style="align-self:flex-start;background:#eef3fe;color:#2E6BE6;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:6px 13px;border-radius:100px;margin-bottom:16px">{{ g.cat }}</span>
            <h3 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:21px;margin:0 0 12px">{{ g.name }}</h3>
            <div style="display:flex;align-items:center;gap:9px;color:#3a4660;font-size:14px;margin-bottom:7px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E6BE6" stroke-width="1.8"><path d="M12 2C7.6 2 4 5.6 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.4-3.6-8-8-8z"/><circle cx="12" cy="10" r="2.4"/></svg>{{ g.campus }}</div>
            <div style="display:flex;align-items:center;gap:9px;color:#3a4660;font-size:14px;margin-bottom:16px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E6BE6" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>{{ g.when }}</div>
            <p style="font-size:14.5px;color:#5A6478;line-height:1.55;margin:0 0 22px;flex:1">{{ g.desc }}</p>
            <a href="Contact.dc.html" style="display:inline-flex;align-items:center;justify-content:center;background:#11203F;color:#fff;text-decoration:none;font-weight:600;font-size:14.5px;padding:13px 22px;border-radius:100px;transition:background .2s" style-hover="background:#2E6BE6">Join This Group</a>
          </div>
        </sc-for>
      </div>
    </div>
  </section>

  <section style="background:#fff;padding:clamp(56px,7vw,96px) clamp(20px,4vw,40px)">
    <div data-reveal style="max-width:680px;margin:0 auto;text-align:center;transition:opacity .7s ease,transform .7s ease">
      <h2 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,4.4vw,48px);line-height:1.05;letter-spacing:-.02em;margin:0 0 28px">Want to lead a group?</h2>
      <a href="Contact.dc.html" style="display:inline-block;background:#2E6BE6;color:#fff;text-decoration:none;font-weight:700;font-size:16px;padding:17px 40px;border-radius:100px;transition:background .2s,transform .2s" style-hover="background:#1f54c4;transform:translateY(-2px)">Start a Group</a>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { campus:'All', day:'All', cat:'All' };
  componentDidMount(){
    const reveal = el => { el.style.opacity='1'; el.style.transform='none'; };
    this._els = Array.from(document.querySelectorAll('[data-reveal]'));
    const check = ()=>{ const h = window.innerHeight||800; this._els = this._els.filter(el=>{ const r=el.getBoundingClientRect(); if(r.top < h*0.9){ reveal(el); return false; } return true; }); if(!this._els.length && this._sc){ window.removeEventListener('scroll', this._sc); this._sc=null; } };
    this._sc = ()=>check();
    window.addEventListener('scroll', this._sc, {passive:true});
    check(); requestAnimationFrame(check); setTimeout(check,250); setTimeout(check,900);
  }
  componentWillUnmount(){ if(this._sc) window.removeEventListener('scroll', this._sc); }
  renderVals(){
    const all = [
      {name:'Young Adults Collective', campus:'CFC Johannesburg', day:'Wednesday', when:'Wednesdays 7:00 PM', cat:'Young Adults', desc:'A vibrant group for 18-30s navigating faith, work and life.'},
      {name:'Marriage Builders', campus:'CFC Johannesburg', day:'Thursday', when:'Thursdays 7:30 PM', cat:'Couples', desc:'Strengthen your marriage alongside other couples.'},
      {name:'Women of Worth', campus:'CFC South', day:'Tuesday', when:'Tuesdays 9:30 AM', cat:'Women', desc:'A warm circle of women growing in faith and friendship.'},
      {name:'Men of Valour', campus:'CFC South', day:'Saturday', when:'Saturdays 7:00 AM', cat:'Men', desc:'Iron sharpens iron - coffee, the Word and real talk.'},
      {name:'Family Life Group', campus:'CFC Johannesburg', day:'Sunday', when:'Sundays 4:00 PM', cat:'Family', desc:'Families doing life together, kids welcome.'},
      {name:'Midweek Connect', campus:'CFC South', day:'Wednesday', when:'Wednesdays 6:30 PM', cat:'Young Adults', desc:'An open group for anyone wanting midweek community.'},
      {name:'Couples & Coffee', campus:'CFC South', day:'Thursday', when:'Thursdays 7:00 PM', cat:'Couples', desc:'Relaxed evenings building strong relationships.'},
      {name:'Ladies Brunch Group', campus:'CFC Johannesburg', day:'Saturday', when:'Saturdays 10:00 AM', cat:'Women', desc:'Brunch, the Bible and belly laughs once a fortnight.'},
    ];
    const { campus, day, cat } = this.state;
    const groups = all.filter(g => (campus==='All'||g.campus===campus) && (day==='All'||g.day===day) && (cat==='All'||g.cat===cat));
    const mk = (vals, key) => vals.map(v => {
      const active = this.state[key]===v;
      return { label:v, set:()=>this.setState({[key]:v}), bg: active?'#2E6BE6':'#fff', color: active?'#fff':'#3a4660', border: active?'#2E6BE6':'#d4d8e0' };
    });
    return {
      groups,
      countLabel: groups.length + (groups.length===1?' group':' groups') + ' found',
      campusOpts: mk(['All','CFC Johannesburg','CFC South'],'campus'),
      dayOpts: mk(['All','Tuesday','Wednesday','Thursday','Saturday','Sunday'],'day'),
      catOpts: mk(['All','Men','Women','Couples','Young Adults','Family'],'cat'),
    };
  }
}
</script>
</body>
</html>
