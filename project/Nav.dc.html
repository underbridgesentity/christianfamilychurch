<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@keyframes cfcMenuIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
[data-dd]{position:relative}
[data-dd]>[data-ddp]{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:16px;opacity:0;visibility:hidden;transition:opacity .22s ease,visibility .22s ease;z-index:1200}
[data-dd]:hover>[data-ddp]{opacity:1;visibility:visible}
[data-dd]>[data-ddp]>div{transform:translateY(8px);transition:transform .24s cubic-bezier(.22,.61,.36,1)}
[data-dd]:hover>[data-ddp]>div{transform:translateY(0)}
[data-dd] [data-caret]{transition:transform .22s ease}
[data-dd]:hover [data-caret]{transform:rotate(180deg)}
[data-ddi]{transition:background .18s ease,padding-left .18s ease}
[data-ddi]:hover{background:rgba(255,255,255,.07);padding-left:18px !important}
</style>
</helmet>
<header style="position:fixed;top:0;left:0;right:0;z-index:1000;background:{{ navBg }};border-bottom:{{ navBorder }};backdrop-filter:{{ navBlur }};-webkit-backdrop-filter:{{ navBlur }};box-shadow:{{ navShadow }};transition:background .4s ease, border-color .4s ease, box-shadow .4s ease;font-family:'Hanken Grotesk',sans-serif">
  <div style="max-width:1340px;margin:0 auto;padding:0 clamp(20px,4vw,40px);height:78px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:15px;text-decoration:none;color:#fff;flex-shrink:0">
      <img src="assets/mark-white.png" alt="CFC" style="height:38px;width:auto;display:block" />
      <span style="font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;letter-spacing:.12em">CHRISTIAN FAMILY CHURCH</span>
    </a>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <nav style="display:flex;align-items:center;gap:clamp(14px,1.9vw,28px)">
      <a href="NewToCFC.dc.html" style="position:relative;color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;opacity:{{ opNew }};padding:6px 0;transition:opacity .2s" style-hover="opacity:1">New to CFC<span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;border-radius:2px;background:{{ ulNew }}"></span></a>

      <div data-dd>
        <a href="About.dc.html" style="display:flex;align-items:center;gap:5px;position:relative;color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;opacity:{{ opAbout }};padding:6px 0;transition:opacity .2s" style-hover="opacity:1">About<svg data-caret width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg><span style="position:absolute;left:0;right:18px;bottom:-2px;height:2px;border-radius:2px;background:{{ ulAbout }}"></span></a>
        <div data-ddp>
          <div style="min-width:230px;background:#0B1830;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;box-shadow:0 30px 60px -20px rgba(0,0,0,.55)">
            <a href="About.dc.html" data-ddi style="display:block;color:#fff;text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Who We Are</a>
            <a href="OurStory.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Our Story</a>
            <a href="Leadership.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Leadership</a>
            <a href="StatementOfFaith.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Statement of Faith</a>
            <a href="Contact.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Contact Us</a>
          </div>
        </div>
      </div>

      <a href="Campuses.dc.html" style="position:relative;color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;opacity:{{ opCampuses }};padding:6px 0;transition:opacity .2s" style-hover="opacity:1">Campuses<span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;border-radius:2px;background:{{ ulCampuses }}"></span></a>

      <div data-dd>
        <a href="Connect.dc.html" style="display:flex;align-items:center;gap:5px;color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;opacity:.78;padding:6px 0;transition:opacity .2s" style-hover="opacity:1">Next Steps<svg data-caret width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
        <div data-ddp>
          <div style="min-width:230px;background:#0B1830;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;box-shadow:0 30px 60px -20px rgba(0,0,0,.55)">
            <a href="Connect.dc.html" data-ddi style="display:block;color:#fff;text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Get Connected</a>
            <a href="GrowthTrack.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Growth Track</a>
            <a href="SmallGroups.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Small Groups</a>
            <a href="DreamTeam.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Dream Team</a>
            <a href="Ministries.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Ministries</a>
            <a href="Events.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Events</a>
          </div>
        </div>
      </div>

      <div data-dd>
        <a href="Watch.dc.html" style="display:flex;align-items:center;gap:5px;position:relative;color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;opacity:{{ opWatch }};padding:6px 0;transition:opacity .2s" style-hover="opacity:1">Watch<svg data-caret width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg><span style="position:absolute;left:0;right:18px;bottom:-2px;height:2px;border-radius:2px;background:{{ ulWatch }}"></span></a>
        <div data-ddp>
          <div style="min-width:210px;background:#0B1830;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;box-shadow:0 30px 60px -20px rgba(0,0,0,.55)">
            <a href="Watch.dc.html" data-ddi style="display:block;color:#fff;text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Messages</a>
            <a href="Series.dc.html" data-ddi style="display:block;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px">Series</a>
            <a href="https://www.youtube.com/@CFCIJohannesburg/live" target="_blank" rel="noopener" data-ddi style="display:flex;align-items:center;gap:9px;color:rgba(255,255,255,.82);text-decoration:none;font-size:14px;font-weight:500;padding:11px 14px;border-radius:8px"><span style="width:7px;height:7px;border-radius:50%;background:#E74C3C"></span>Watch Live</a>
          </div>
        </div>
      </div>

      <a href="Giving.dc.html" style="position:relative;color:#fff;text-decoration:none;font-size:14.5px;font-weight:500;opacity:{{ opGive }};padding:6px 0;transition:opacity .2s" style-hover="opacity:1">Give<span style="position:absolute;left:0;right:0;bottom:-2px;height:2px;border-radius:2px;background:{{ ulGive }}"></span></a>
      <a href="SignIn.dc.html" style="display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;font-size:14px;font-weight:500;opacity:.9;padding:9px 18px;border:1px solid rgba(255,255,255,.28);border-radius:100px;transition:border-color .2s,background .2s" style-hover="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.5)">Sign In</a>
    </nav>
    </sc-if>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ toggle }}" aria-label="Menu" style="display:flex;flex-direction:column;justify-content:center;gap:5px;width:46px;height:46px;background:transparent;border:none;cursor:pointer;padding:0">
      <span style="display:block;width:24px;height:2px;background:#fff;border-radius:2px;margin:0 auto"></span>
      <span style="display:block;width:24px;height:2px;background:#fff;border-radius:2px;margin:0 auto"></span>
      <span style="display:block;width:24px;height:2px;background:#fff;border-radius:2px;margin:0 auto"></span>
    </button>
    </sc-if>
  </div>

  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;inset:0;z-index:1100;background:#0A1631;animation:cfcMenuIn .28s ease;display:flex;flex-direction:column;font-family:'Hanken Grotesk',sans-serif">
    <div style="height:78px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.08)">
      <img src="assets/mark-white.png" alt="CFC" style="height:36px" />
      <button onClick="{{ toggle }}" aria-label="Close" style="width:46px;height:46px;background:transparent;border:none;color:#fff;font-size:30px;cursor:pointer;line-height:1">&times;</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:30px 28px 40px;display:flex;flex-direction:column;gap:2px">
      <sc-for list="{{ mobileLinks }}" as="m" hint-placeholder-count="8">
        <a href="{{ m.href }}" style="color:#fff;text-decoration:none;font-family:'Archivo',sans-serif;font-weight:700;font-size:24px;letter-spacing:-.01em;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.07)">{{ m.label }}</a>
      </sc-for>
      <div style="display:flex;gap:12px;margin-top:26px">
        <a href="Giving.dc.html" style="flex:1;text-align:center;background:#2E6BE6;color:#fff;text-decoration:none;font-weight:700;padding:15px;border-radius:100px">Give</a>
        <a href="SignIn.dc.html" style="flex:1;text-align:center;color:#fff;text-decoration:none;font-weight:600;padding:15px;border:1px solid rgba(255,255,255,.3);border-radius:100px">Sign In</a>
      </div>
    </div>
  </div>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;overlay&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { open:false, scrolled:false, w: (typeof window!=='undefined'?window.innerWidth:1280) };
  componentDidMount(){
    this._s = ()=>{ const v = window.scrollY > 24; if(v!==this.state.scrolled) this.setState({scrolled:v}); };
    this._r = ()=>{ if(window.innerWidth!==this.state.w) this.setState({w:window.innerWidth}); };
    window.addEventListener('scroll', this._s, {passive:true});
    window.addEventListener('resize', this._r);
    this._s();
  }
  componentWillUnmount(){ window.removeEventListener('scroll', this._s); window.removeEventListener('resize', this._r); }
  renderVals(){
    const overlay = this.props.overlay ?? false;
    const solid = this.state.scrolled || !overlay;
    const isDesktop = this.state.w >= 1000;
    const active = this.props.active || '';
    const accent = '#2E6BE6';
    const navBg = solid ? 'rgba(11,24,48,0.55)' : 'linear-gradient(to bottom, rgba(7,15,33,.6), rgba(7,15,33,0))';
    const ul = k => active===k ? accent : 'transparent';
    const op = k => active===k ? 1 : 0.78;
    const mobileLinks = [
      {label:'New to CFC', href:'NewToCFC.dc.html'},
      {label:'About', href:'About.dc.html'},
      {label:'Campuses', href:'Campuses.dc.html'},
      {label:'Get Connected', href:'Connect.dc.html'},
      {label:'Growth Track', href:'GrowthTrack.dc.html'},
      {label:'Small Groups', href:'SmallGroups.dc.html'},
      {label:'Dream Team', href:'DreamTeam.dc.html'},
      {label:'Ministries', href:'Ministries.dc.html'},
      {label:'Watch', href:'Watch.dc.html'},
      {label:'Events', href:'Events.dc.html'},
      {label:'Contact', href:'Contact.dc.html'},
    ];
    return {
      isDesktop, isMobile: !isDesktop, open:this.state.open,
      navBg,
      navBorder: solid ? '1px solid rgba(255,255,255,.12)' : '1px solid transparent',
      navBlur: solid ? 'saturate(1.8) blur(22px)' : 'saturate(1) blur(0px)',
      navShadow: solid ? '0 10px 34px -14px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12)' : 'none',
      opNew:op('new'), opAbout:op('about'), opCampuses:op('campuses'), opWatch:op('watch'), opGive:op('give'),
      ulNew:ul('new'), ulAbout:ul('about'), ulCampuses:ul('campuses'), ulWatch:ul('watch'), ulGive:ul('give'),
      mobileLinks,
      toggle: ()=> this.setState(s=>({open:!s.open})),
    };
  }
}
</script>
</body>
</html>
