<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0}*{box-sizing:border-box}/*resp*/@media(max-width:1024px){[style*="grid-template-columns: repeat(4, 1fr)"]{grid-template-columns:1fr 1fr !important}[style*="grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr 1fr !important}}@media(max-width:768px){[style*="grid-template-columns: 1fr 1fr"],[style*="grid-template-columns: 1.4fr 1fr"],[style*="grid-template-columns: 1.25fr 1fr"],[style*="grid-template-columns: 0.85fr 1.15fr"],[style*="grid-template-columns: repeat(4, 1fr)"],[style*="grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr"]{grid-template-columns:1fr !important}}input::placeholder,textarea::placeholder{color:#9aa3b5}</style>
</helmet>
<div style="width:100%;overflow-x:hidden;font-family:'Hanken Grotesk',sans-serif;color:#11203F;background:#fff">
  <dc-import name="Nav" overlay="{{ false }}" active="" hint-size="100%,78px"></dc-import>

  <section data-screen-label="Contact" style="padding:118px clamp(20px,4vw,40px) clamp(64px,8vw,110px);background:#fff">
    <div style="max-width:1180px;margin:0 auto">
      <div style="margin-bottom:48px;max-width:680px">
        <p style="font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#2E6BE6;margin:0 0 16px">Contact</p>
        <h1 style="font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(32px,5vw,60px);line-height:1.02;letter-spacing:-.03em;margin:0">We&rsquo;d Love to Hear from You</h1>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,4vw,56px);align-items:start">
        <!-- LEFT: campus info -->
        <div>
          <p style="font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3b5;margin:0 0 12px">Select a campus</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px">
            <sc-for list="{{ campusTabs }}" as="o" hint-placeholder-count="2">
              <button onClick="{{ o.set }}" style="background:{{ o.bg }};color:{{ o.color }};border:1px solid {{ o.border }};font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:14px;padding:10px 20px;border-radius:100px;cursor:pointer;transition:all .2s">{{ o.label }}</button>
            </sc-for>
          </div>
          <div style="background:#F4F5F7;border-radius:12px;padding:28px;margin-bottom:18px">
            <div style="display:flex;align-items:flex-start;gap:13px;margin-bottom:18px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2E6BE6" stroke-width="1.8" style="flex-shrink:0;margin-top:2px"><path d="M12 2C7.6 2 4 5.6 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.4-3.6-8-8-8z"/><circle cx="12" cy="10" r="2.4"/></svg><div><p style="font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9aa3b5;margin:0 0 5px">Address</p><p style="font-size:15px;margin:0;line-height:1.5">{{ address }}</p></div></div>
            <div style="display:flex;align-items:flex-start;gap:13px;margin-bottom:18px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2E6BE6" stroke-width="1.8" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><div><p style="font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9aa3b5;margin:0 0 5px">Service Times</p><p style="font-size:15px;margin:0;line-height:1.5">{{ times }}</p></div></div>
            <div style="display:flex;align-items:flex-start;gap:13px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2E6BE6" stroke-width="1.8" style="flex-shrink:0;margin-top:2px"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.5 2.1L7.6 9.8a16 16 0 006 6l1.4-1.4a2 2 0 012.1-.4c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z"/></svg><div><p style="font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9aa3b5;margin:0 0 5px">Phone &amp; Email</p><p style="font-size:15px;margin:0;line-height:1.5">{{ phone }}</p></div></div>
          </div>
          <div style="border-radius:12px;overflow:hidden;height:260px;box-shadow:0 1px 3px rgba(11,24,48,.1)"><iframe title="Campus map" src="{{ mapSrc }}" style="width:100%;height:100%;border:0" loading="lazy"></iframe></div>
          <div style="display:flex;gap:10px;margin-top:22px">
            <a href="Home.dc.html" aria-label="Facebook" style="display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;border:1px solid #d4d8e0;color:#11203F;transition:all .2s" style-hover="background:#2E6BE6;border-color:#2E6BE6;color:#fff"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5 3.66 9.15 8.44 9.94v-7.03H7.9v-2.9h2.54V9.85c0-2.51 1.49-3.9 3.78-3.9 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.44 2.9h-2.34V22c4.78-.79 8.44-4.94 8.44-9.94Z"/></svg></a>
            <a href="Home.dc.html" aria-label="Instagram" style="display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;border:1px solid #d4d8e0;color:#11203F;transition:all .2s" style-hover="background:#2E6BE6;border-color:#2E6BE6;color:#fff"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1.2" fill="currentColor" stroke="none"/></svg></a>
            <a href="Watch.dc.html" aria-label="YouTube" style="display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;border:1px solid #d4d8e0;color:#11203F;transition:all .2s" style-hover="background:#2E6BE6;border-color:#2E6BE6;color:#fff"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.6 7.2s-.2-1.37-.8-1.97c-.76-.8-1.6-.8-2-.85C16 4.1 12 4.1 12 4.1s-4 0-6.8.28c-.4.05-1.24.05-2 .85-.6.6-.8 1.97-.8 1.97S2 8.8 2 10.4v1.5c0 1.6.2 3.2.2 3.2s.2 1.37.8 1.97c.76.8 1.76.77 2.2.86 1.6.15 6.8.2 6.8.2s4 0 6.8-.29c.4-.05 1.24-.05 2-.85.6-.6.8-1.97.8-1.97s.2-1.6.2-3.2v-1.5c0-1.6-.2-3.2-.2-3.2ZM9.94 14.5V8.9l5.2 2.8-5.2 2.8Z"/></svg></a>
          </div>
        </div>

        <!-- RIGHT: form -->
        <div style="background:#0B1830;border-radius:14px;padding:clamp(28px,3vw,40px)">
          <sc-if value="{{ sent }}" hint-placeholder-val="{{ false }}">
            <div style="text-align:center;padding:40px 10px;color:#fff">
              <div style="width:64px;height:64px;border-radius:50%;background:#2E6BE6;display:flex;align-items:center;justify-content:center;margin:0 auto 22px"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M4 12l5 5L20 6"/></svg></div>
              <h3 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:24px;margin:0 0 10px">Message sent!</h3>
              <p style="font-size:15px;color:rgba(255,255,255,.7);margin:0">Thanks for reaching out - our team will be in touch soon.</p>
            </div>
          </sc-if>
          <sc-if value="{{ notSent }}" hint-placeholder-val="{{ true }}">
          <div>
            <h3 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:24px;color:#fff;margin:0 0 24px">Send us a message</h3>
            <div style="display:flex;flex-direction:column;gap:16px">
              <div><label style="display:block;font-size:12px;font-weight:600;letter-spacing:.04em;color:#9DBDF7;margin-bottom:7px">Name</label><input type="text" placeholder="Your full name" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:14px 16px;font-size:15px;color:#fff;font-family:inherit;outline:none" style-focus="border-color:#2E6BE6" /></div>
              <div><label style="display:block;font-size:12px;font-weight:600;letter-spacing:.04em;color:#9DBDF7;margin-bottom:7px">Email</label><input type="email" placeholder="you@email.com" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:14px 16px;font-size:15px;color:#fff;font-family:inherit;outline:none" style-focus="border-color:#2E6BE6" /></div>
              <div><label style="display:block;font-size:12px;font-weight:600;letter-spacing:.04em;color:#9DBDF7;margin-bottom:7px">Campus</label>
                <select style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:14px 16px;font-size:15px;color:#fff;font-family:inherit;outline:none" style-focus="border-color:#2E6BE6">
                  <option style="color:#11203F">CFC Johannesburg</option>
                  <option style="color:#11203F">CFC South</option>
                </select>
              </div>
              <div><label style="display:block;font-size:12px;font-weight:600;letter-spacing:.04em;color:#9DBDF7;margin-bottom:7px">Message</label><textarea rows="4" placeholder="How can we help?" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:14px 16px;font-size:15px;color:#fff;font-family:inherit;outline:none;resize:vertical" style-focus="border-color:#2E6BE6"></textarea></div>
              <button onClick="{{ submit }}" style="background:#2E6BE6;color:#fff;border:none;font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:16px;padding:16px;border-radius:100px;cursor:pointer;transition:background .2s;margin-top:6px" style-hover="background:#1f54c4">Send Message</button>
            </div>
          </div>
          </sc-if>
        </div>
      </div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,520px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { campus:'jhb', sent:false };
  renderVals(){
    const data = {
      jhb: { label:'CFC Johannesburg', address:'Cnr. Atlas Rd. & Silver Wings Blvd., Parkhaven, Boksburg, Gauteng', times:'Sundays 08:30 & 10:30 AM', phone:'011 230 9300 \u00b7 info@cfcsa.co.za', map:'https://www.google.com/maps?q=Atlas+Road,+Parkhaven,+Boksburg&z=14&output=embed' },
      south: { label:'CFC South', address:'21 Heidelberg Rd, Newmarket AH, Alberton, 1449', times:'Sundays 08:30 & 10:30 AM', phone:'011 230 9300 \u00b7 info@cfcsa.co.za', map:'https://www.google.com/maps?q=21+Heidelberg+Road,+Alberton&z=14&output=embed' },
    };
    const cur = data[this.state.campus];
    const campusTabs = [['jhb','CFC Johannesburg'],['south','CFC South']].map(([k,l])=>{
      const active = this.state.campus===k;
      return { label:l, set:()=>this.setState({campus:k}), bg: active?'#2E6BE6':'#fff', color: active?'#fff':'#3a4660', border: active?'#2E6BE6':'#d4d8e0' };
    });
    return {
      campusTabs, address: cur.address, times: cur.times, phone: cur.phone, mapSrc: cur.map,
      sent: this.state.sent, notSent: !this.state.sent,
      submit: ()=> this.setState({sent:true}),
    };
  }
}
</script>
</body>
</html>
